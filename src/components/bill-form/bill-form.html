<h2 mat-dialog-title>{{ isEditMode ? 'Edit Bill' : 'Add Bill' }}</h2>

<mat-dialog-content>
  <form [formGroup]="form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name" maxlength="100" />
      @if (form.get('name')?.invalid && form.get('name')?.touched) {
        <mat-error>Name is required</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Cost</mat-label>
      <input matInput type="number" formControlName="cost" min="0.01" step="0.01" />
      <mat-hint>Leave empty for unfixed price</mat-hint>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Emoji (optional)</mat-label>
      <input matInput formControlName="emoji" maxlength="4" />
    </mat-form-field>

    <mat-checkbox formControlName="isBasicNecessity" class="necessity-checkbox">
      Basic Necessity
    </mat-checkbox>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-flat-button (click)="save()" [disabled]="form.invalid">Save</button>
</mat-dialog-actions>
