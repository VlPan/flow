<h2 mat-dialog-title>{{ isEditMode ? 'Edit Reward' : 'Add Reward' }}</h2>

<mat-dialog-content>
  <form [formGroup]="form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name" maxlength="100" />
      @if (form.get('name')?.invalid && form.get('name')?.touched) {
        <mat-error>Name is required</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Cost</mat-label>
      <input matInput type="number" formControlName="cost" min="0.01" step="0.01" />
      @if (form.get('cost')?.invalid && form.get('cost')?.touched) {
        <mat-error>Enter a valid cost greater than 0</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Emoji (optional)</mat-label>
      <input matInput formControlName="emoji" maxlength="4" />
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-flat-button (click)="save()" [disabled]="form.invalid">
    {{ isEditMode ? 'Save' : 'Add' }}
  </button>
</mat-dialog-actions>
