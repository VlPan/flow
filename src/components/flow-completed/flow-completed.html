<div class="content">
  <h3 class="section-label">Completed</h3>

  <div class="records-list">
    @for (record of todayRecords(); track record.id) {
      <app-flow-completed-row
        [record]="record"
        [vector]="vectorFor(record)"
        (editRequested)="onEdit(record)"
        (deleteRequested)="onDelete(record)"
      />
    }

    @if (todayRecords().length === 0) {
      <div class="empty-state">No completed sessions today</div>
    }
  </div>
</div>
