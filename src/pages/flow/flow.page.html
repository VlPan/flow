<as-split direction="horizontal" (dragEnd)="onDragEnd($event)" style="height: 100%">
  <as-split-area [size]="uiService.flowSplitSizes()[0]">
    <app-flow-planning />
  </as-split-area>
  <as-split-area [size]="uiService.flowSplitSizes()[1]">
    <app-flow-completed />
  </as-split-area>
</as-split>
